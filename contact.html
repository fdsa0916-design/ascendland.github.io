<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brown-dark: #3D2F2A; --brown-mid: #5C4A43; --brown-light: #8B7B75;
  --cream: #F0EDE6; --cream-dark: #E5E0D8; --cream-darker: #D8D2C8;
  --white: #FAF8F5; --text-dark: #2A1F1B; --text-mid: #5C4A43; --text-light: #8B7B75;
}
body { font-family: 'Noto Sans TC', sans-serif; background: var(--brown-dark); color: var(--cream); font-weight: 300; min-height: 100vh; -webkit-font-smoothing: antialiased; }
.contact-header {
  padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 0.5px solid rgba(240,237,230,0.1);
}
.contact-header-logo { display: flex; align-items: center; gap: 0.7rem; text-decoration: none; }
.contact-header-logo svg { width: 30px; height: 30px; }
.contact-header-title { font-family: 'AR Gyokaisho','Noto Serif TC',serif; font-size: 0.85rem; letter-spacing: 0.2em; color: var(--cream); }
.contact-close { font-size: 0.75rem; letter-spacing: 0.15em; color: rgba(240,237,230,0.5); cursor: pointer; background: none; border: none; transition: color 0.2s; }
.contact-close:hover { color: var(--cream); }
.contact-inner { max-width: 860px; margin: 0 auto; padding: 3rem 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; }
.contact-info { display: flex; flex-direction: column; gap: 2rem; }
.contact-item { display: flex; flex-direction: column; gap: 0.3rem; }
.contact-item-label { font-size: 0.6rem; letter-spacing: 0.35em; color: rgba(240,237,230,0.4); font-family: 'Cormorant Garamond',serif; font-style: italic; }
.contact-item-value { font-family: 'Noto Serif TC',serif; font-size: 0.95rem; letter-spacing: 0.1em; color: var(--cream); font-weight: 300; }
.contact-item-value a { color: var(--cream); text-decoration: none; }
.contact-form { display: flex; flex-direction: column; gap: 1rem; }
.form-row { display: flex; gap: 0.8rem; }
.form-group { flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
.form-label { font-size: 0.65rem; letter-spacing: 0.25em; color: rgba(240,237,230,0.5); }
.form-input, .form-textarea, .form-select { background: rgba(240,237,230,0.06); border: 0.5px solid rgba(240,237,230,0.2); color: var(--cream); padding: 0.8rem 1rem; font-size: 0.85rem; font-family: 'Noto Sans TC',sans-serif; outline: none; border-radius: 2px; transition: border-color 0.2s; width: 100%; }
.form-input::placeholder, .form-textarea::placeholder { color: rgba(240,237,230,0.25); }
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: rgba(240,237,230,0.5); }
.form-textarea { resize: none; height: 100px; }
.form-select option { background: var(--brown-dark); color: var(--cream); }
.form-submit { background: var(--cream); color: var(--brown-dark); border: none; padding: 1rem 2rem; font-size: 0.8rem; letter-spacing: 0.2em; font-family: 'Noto Sans TC',sans-serif; cursor: pointer; border-radius: 2px; transition: background 0.2s; margin-top: 0.5rem; font-weight: 400; width: 100%; }
.form-submit:hover { background: var(--cream-dark); }
@media (max-width: 640px) { .contact-inner { grid-template-columns: 1fr; gap: 2rem; padding: 2rem 1.2rem; } }
</style>
